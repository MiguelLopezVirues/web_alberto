<!DOCTYPE html>

<title>Shape Preview — shapes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f2; padding: 40px 32px; }
  h1 { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #888; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
  .card { background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #e8e8e4; }
  .preview-box { padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 180px; }
  .preview-box svg { max-width: 100%; max-height: 160px; }
  .meta { padding: 12px 16px; border-top: 1px solid #f0f0ec; }
  .filename { font-size: 11px; font-family: monospace; color: #555; font-weight: 600; }
  .role { font-size: 10px; color: #888; margin-top: 3px; }
  .uses { font-size: 9px; color: #aaa; margin-top: 4px; letter-spacing: .04em; }
  .empty { color: #aaa; font-size: 13px; padding: 60px; text-align: center; grid-column: 1/-1; }
</style>
</head>
